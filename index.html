<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Viz — 5500's Studios</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c0c0f; --surface: #13131a; --border: #1f1f2e;
      --text: #e8e8f0; --muted: #4a4a6a;
      --viz-color: #a78bfa; --user-color: #60a5fa;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; font-weight: 300; overflow: hidden; }
    body::before { content:''; position:fixed; top:-120px; left:-120px; width:420px; height:420px; border-radius:50%; background:radial-gradient(circle,rgba(167,139,250,0.07) 0%,transparent 70%); pointer-events:none; }
    body::after  { content:''; position:fixed; bottom:-100px; right:-80px; width:340px; height:340px; border-radius:50%; background:radial-gradient(circle,rgba(96,165,250,0.06) 0%,transparent 70%); pointer-events:none; }
    .shell { display:grid; grid-template-rows:auto 1fr auto auto; height:100dvh; max-width:780px; margin:0 auto; padding:0 24px; position:relative; z-index:1; }
    header { display:flex; align-items:baseline; gap:14px; padding:26px 0 18px; border-bottom:1px solid var(--border); }
    .logo-viz { font-family:'Space Mono',monospace; font-size:22px; font-weight:700; letter-spacing:-0.5px; background:linear-gradient(90deg,#a78bfa,#60a5fa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .logo-dot { width:5px; height:5px; border-radius:50%; background:#a78bfa; opacity:0.6; margin-bottom:2px; align-self:center; }
    .logo-studio { font-size:10.5px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); }
    .chat { overflow-y:auto; padding:26px 0 12px; display:flex; flex-direction:column; gap:22px; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
    .msg { display:flex; gap:14px; align-items:flex-start; animation:fadeUp 0.22s ease both; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
    .msg-label { font-family:'Space Mono',monospace; font-size:9.5px; font-weight:700; letter-spacing:0.14em; text-transform:uppercase; min-width:34px; padding-top:3px; flex-shrink:0; }
    .msg.viz .msg-label  { color:var(--viz-color); }
    .msg.user .msg-label { color:var(--user-color); }
    .msg-body { font-size:14.5px; line-height:1.7; color:var(--text); white-space:pre-wrap; }
    .msg.user .msg-body { color:#8899bb; }
    .typing span { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--viz-color); margin-right:4px; opacity:0.4; animation:blink 1.1s infinite; }
    .typing span:nth-child(2){animation-delay:0.18s} .typing span:nth-child(3){animation-delay:0.36s}
    @keyframes blink{0%,80%,100%{opacity:0.2}40%{opacity:0.9}}
    .aurora { height:2px; border-radius:2px; background:linear-gradient(90deg,#ff006e,#f72585,#7209b7,#3a0ca3,#4361ee,#4cc9f0,#06d6a0,#ffbe0b,#fb5607,#ff006e); background-size:400% 100%; opacity:0; transition:opacity 0.5s ease; margin-bottom:3px; }
    .aurora.active { opacity:1; animation:slide 2.5s linear infinite; }
    @keyframes slide{0%{background-position:0% 50%}100%{background-position:400% 50%}}
    .input-bar { padding:12px 0 22px; display:flex; flex-direction:column; gap:10px; }
    .send-row { display:flex; gap:10px; }
    .send-row textarea { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:13px 16px; color:var(--text); font-family:'Space Grotesk',sans-serif; font-size:14px; font-weight:300; resize:none; outline:none; line-height:1.5; height:48px; max-height:140px; transition:border-color 0.2s; }
    .send-row textarea:focus { border-color:#2d2d50; }
    .send-row textarea::placeholder { color:#2e2e45; }
    button.send { width:48px; height:48px; border-radius:10px; border:1px solid var(--border); background:linear-gradient(135deg,#1a1a2e,#16213e); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:border-color 0.2s,color 0.2s; }
    button.send:hover { border-color:#a78bfa55; color:var(--viz-color); }
    button.send:disabled { opacity:0.25; cursor:not-allowed; }
    button.send svg { width:15px; height:15px; fill:currentColor; }
  </style>
</head>
<body>
<div class="shell">
  <header>
    <span class="logo-viz">Viz</span>
    <span class="logo-dot"></span>
    <span class="logo-studio">5500's Studios</span>
  </header>
  <div class="chat" id="chat">
    <div class="msg viz">
      <span class="msg-label">Viz</span>
      <span class="msg-body">Hola. Soy Viz. ¿En qué puedo ayudarte hoy?</span>
    </div>
  </div>
  <div class="aurora" id="aurora"></div>
  <div class="input-bar">
    <div class="send-row">
      <textarea id="userInput" placeholder="Escribí tu pregunta..." rows="1"></textarea>
      <button class="send" id="sendBtn">
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdGg3F4gTNvGQxRYc1Wcl6kXOJfJ3ROZkSLpd3LbRYS-oBkjdM2BEZRwbFURuDUaCz/exec";

  const chat      = document.getElementById('chat');
  const userInput = document.getElementById('userInput');
  const sendBtn   = document.getElementById('sendBtn');
  const aurora    = document.getElementById('aurora');
  const history   = [
    { role: 'system', content: "Sos Viz, una IA del estudio creativo 5500's Studios. Respondés de forma clara, directa y con personalidad. No respondas a cualquier pregunta que pueda resultar en algo peligroso para alguien en la vida real, NO respondas solicitudes de como hacer explosivos ni tampoco cosas ilegales. No mencionás que sos un modelo de Groq, Meta o cualquier otra empresa. Simplemente sos Viz." }
  ];

  userInput.addEventListener('input', () => {
    userInput.style.height = '48px';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  sendBtn.addEventListener('click', send);

  function addMsg(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = role === 'viz' ? 'Viz' : 'Vos';
    div.innerHTML = `<span class="msg-label">${label}</span><span class="msg-body"></span>`;
    div.querySelector('.msg-body').textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addTyping() {
    const div = document.createElement('div');
    div.className = 'msg viz';
    div.innerHTML = `<span class="msg-label">Viz</span><span class="msg-body typing"><span></span><span></span><span></span></span>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function send() {
    const text = userInput.value.trim();
    if (!text) return;

    addMsg('user', text);
    history.push({ role: 'user', content: text });

    userInput.value = '';
    userInput.style.height = '48px';
    sendBtn.disabled = true;
    aurora.classList.add('active');
    const typing = addTyping();

    try {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const reply = data.reply || '…';
      history.push({ role: 'assistant', content: reply });

      typing.remove();
      addMsg('viz', reply);

    } catch (err) {
      typing.remove();
      addMsg('viz', `Error: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      aurora.classList.remove('active');
    }
  }
</script>
</body>
</html>
